services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cohortvault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cohortvault"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    image: node:22
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install && pnpm dev:web"
    ports:
      - "3000:3000"
    volumes:
      - ../../:/app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

  api:
    image: python:3.12-slim
    working_dir: /app
    command: >
      sh -lc "
        apt-get update &&
        apt-get install -y --no-install-recommends curl &&
        rm -rf /var/lib/apt/lists/* &&
        pip install -e apps/api --quiet &&
        python -m app.migrate &&
        python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    ports:
      - "8000:8000"
    volumes:
      - ../../:/app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      COHORTVAULT_API_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cohortvault
      COHORTVAULT_API_WEB_ORIGIN: http://localhost:3000
      COHORTVAULT_API_COOKIE_SECURE: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: sh -lc "pip install -e apps/api && cd apps/worker && python -m worker.main"
    volumes:
      - ../../:/app
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      COHORTVAULT_API_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cohortvault
      COHORTVAULT_API_WORKER_POLL_INTERVAL_SECONDS: "2"
    restart: unless-stopped

volumes:
  postgres-data:
