name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: cohortvault
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cohortvault"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      COHORTVAULT_API_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cohortvault

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "apps/api[dev]"

      - name: Install pyright (non-blocking)
        run: python -m pip install pyright --quiet

      - name: Run pyright (non-blocking)
        run: pyright -p apps/api/pyrightconfig.json
        continue-on-error: true

      # COHORTVAULT_API_OPENAI_API_KEY is intentionally not set.
      # conftest.py monkeypatches call_chat and embed_text during tests.
      - name: Run API tests
        run: python -m pytest apps/api/tests/ -v --tb=short

  node:
    name: Node typecheck + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.32.1"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
